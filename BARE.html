<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BARE, Brand Aesthetic Reality Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // ── Fill in your Firebase project config here ──
  const FIREBASE_CONFIG = {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };
  if (FIREBASE_CONFIG.apiKey) {
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      window.__db = firebase.firestore();
    } catch (e) { console.warn("Firebase init:", e.message); }
  }
</script>

<style>
  :root {
    --paper: #ffffff;
    --paper-2: #f4f4f4;
    --ink: #000000;
    --ink-2: #1a1a1a;
    --muted: #6b6b6b;
    --rule: #000000;
    --accent: #ff6a1a;
    --red: var(--accent);
    --green: var(--accent);
    --amber: var(--accent);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Archivo', -apple-system, sans-serif;
  }
  body { min-height: 100vh; overflow-x: hidden; }

  .app { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Top rail */
  .rail {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 4px 0 20px;
  }
  .rail .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .rail .pill .dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.6s infinite;
  }
  @keyframes blink { 0%, 60% { opacity: 1; } 70%, 100% { opacity: 0.25; } }

  /* Block system */
  .block {
    margin-bottom: 8px;
    padding: 32px 28px;
    border-radius: 2px;
  }
  .block.paper { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
  .block.ink   { background: var(--ink); color: var(--paper); }
  .block.white { background: #f6f2e9; color: var(--ink); border: 1px solid rgba(14,14,12,0.12); }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.75;
  }
  .block.ink .eyebrow { opacity: 0.65; }

  .h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(44px, 8vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.035em;
  }
  .h1 .dot { color: inherit; }
  .h2 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(34px, 5.4vw, 58px);
    line-height: 0.95;
    letter-spacing: -0.03em;
  }
  .h3 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  /* HERO */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  @media (max-width: 820px) { .hero { grid-template-columns: 1fr; } }

  .hero-left {
    background: var(--ink);
    color: var(--paper);
    padding: 28px 28px 32px;
    position: relative;
    min-height: 520px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .hero-nav {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-nav div { display: flex; flex-direction: column; gap: 6px; }
  .hero-nav .right { text-align: right; }
  .hero-nav a { color: inherit; text-decoration: none; opacity: 0.8; }
  .hero-nav a:hover { opacity: 1; text-decoration: underline; }

  .hero-stack {
    position: relative;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hero-stack .tile {
    position: absolute;
    width: 140px;
    height: 180px;
    background: repeating-linear-gradient(-45deg, #222 0 6px, #333 6px 12px);
    border: 1px solid #444;
  }
  .hero-stack .tile:nth-child(1) { transform: translate(-90px, -10px) rotate(-8deg); background: linear-gradient(135deg, #1a1a1a, #333); }
  .hero-stack .tile:nth-child(2) { transform: translate(60px, 18px) rotate(6deg); }
  .hero-stack .tile:nth-child(3) { transform: translate(-10px, -25px) rotate(-2deg); background: linear-gradient(180deg, #2a2a2a, #1a1a1a); }
  .hero-stack .tile .label {
    position: absolute;
    bottom: 8px; left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: rgba(236,231,221,0.4);
  }

  .hero-wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(68px, 11vw, 132px);
    line-height: 0.82;
    letter-spacing: -0.05em;
    text-align: center;
    position: relative;
  }
  .hero-wordmark sup {
    font-family: 'Archivo', sans-serif;
    font-weight: 400;
    font-size: 0.22em;
    vertical-align: 0.9em;
    margin-left: 0.1em;
  }
  .hero-tagline {
    margin-top: 28px;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
    text-align: center;
  }
  .hero-tagline .tag-eyebrow {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 14px;
  }
  .hero-tagline p {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 2vw, 22px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    color: var(--paper);
    text-wrap: balance;
  }
  .hero-tagline p.small {
    font-weight: 400;
    font-size: 13px;
    line-height: 1.5;
    letter-spacing: 0;
    opacity: 0.7;
    margin-top: 14px;
  }
  .hero-tagline .u {
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--accent);
  }
  .hero-footnote {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Hero right: intake */
  .hero-right {
    background: var(--paper);
    padding: 28px;
    border: 1px solid var(--ink);
    min-height: 520px;
    display: flex;
    flex-direction: column;
  }
  .hero-right h2 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(38px, 5.5vw, 64px);
    line-height: 0.95;
    letter-spacing: -0.03em;
  }
  .hero-right h2 .u { text-decoration: underline; text-underline-offset: 6px; text-decoration-thickness: 2px; }
  .hero-right h2 .dot { color: var(--red); }

  .intake-subgrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 8px;
  }
  @media (max-width: 600px) { .intake-subgrid { grid-template-columns: 1fr; } }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .bare-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--ink);
    padding: 10px 0 8px;
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    font-weight: 500;
    font-size: 16px;
    outline: none;
    letter-spacing: -0.01em;
  }
  .bare-input::placeholder { color: rgba(14,14,12,0.3); font-weight: 400; }
  .bare-input:focus { border-bottom-color: var(--red); }

  .upload {
    border: 1.5px dashed var(--ink);
    cursor: pointer;
    position: relative;
    height: 100%;
    min-height: 140px;
    background: repeating-linear-gradient(-45deg, transparent 0 6px, rgba(14,14,12,0.04) 6px 7px);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .upload:hover { border-color: var(--red); }
  .upload .hint {
    text-align: center;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .upload .hint .plus {
    display: block;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 36px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .upload img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(1) contrast(1.08);
  }
  .upload .chip {
    position: absolute; top: 8px; right: 8px;
    background: var(--ink); color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 3px 7px;
  }

  .run-btn {
    margin-top: auto;
    padding: 20px 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    transition: background 0.15s;
  }
  .run-btn:hover:not(:disabled) { background: var(--red); }
  .run-btn:disabled {
    background: transparent;
    color: var(--muted);
    border: 1.5px dashed var(--muted);
    cursor: not-allowed;
  }
  .run-btn .arrow {
    display: inline-flex;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--paper);
    color: var(--ink);
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
  }
  .run-btn:disabled .arrow { background: var(--muted); color: var(--paper); }

  .consent {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-2);
    margin: 16px 0 20px;
  }
  .consent a, .consent .u { text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }

  /* MANIFESTO block */
  .manifesto {
    background: var(--paper);
    padding: 36px 28px 40px;
    border: 1px solid var(--ink);
    margin-bottom: 8px;
  }
  .manifesto .body {
    font-family: 'Archivo', sans-serif;
    font-weight: 500;
    font-size: clamp(24px, 3.4vw, 38px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-top: 10px;
    text-wrap: balance;
    max-width: 900px;
  }
  .manifesto .body .u {
    text-decoration: underline;
    text-underline-offset: 5px;
    text-decoration-thickness: 2px;
  }
  .manifesto .body em {
    font-style: normal;
    color: var(--red);
  }
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--ink);
  }
  .stat {
    font-family: 'Archivo', sans-serif;
  }
  .stat .n {
    font-weight: 900;
    font-size: clamp(48px, 7vw, 84px);
    line-height: 0.85;
    letter-spacing: -0.04em;
  }
  .stat .l {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 10px;
    color: var(--ink-2);
  }

  /* SPECIMEN / HOW IT WORKS inverted block */
  .works {
    background: var(--ink);
    color: var(--paper);
    padding: 36px 28px 40px;
    margin-bottom: 8px;
  }
  .works-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 20px;
    border-bottom: 1px solid rgba(236,231,221,0.25);
    padding-bottom: 20px;
    margin-bottom: 8px;
  }
  .works-head .tags {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .works-head .tags a { color: inherit; text-decoration: none; opacity: 0.75; }
  .works-head .tags a.active { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  .dim-row {
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    gap: 20px;
    align-items: center;
    padding: 22px 0;
    border-bottom: 1px solid rgba(236,231,221,0.2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .dim-row:hover { background: rgba(236,231,221,0.04); }
  .dim-row .num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.04em;
    opacity: 0.7;
  }
  .dim-row .t {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(16px, 2vw, 20px);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .dim-row .ic {
    font-family: 'Archivo', sans-serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1;
    text-align: right;
    width: 20px;
    transition: transform 0.3s;
  }
  .dim-row.open .ic { transform: rotate(45deg); }
  .dim-row.scanning .ic { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dim-row .score-inline {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.02em;
    text-align: right;
  }
  .dim-row .t .sub {
    display: block;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.15em;
    opacity: 0.55;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }

  .dim-body {
    padding: 0 0 20px 80px;
    font-family: 'Archivo', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: rgba(236,231,221,0.8);
    border-bottom: 1px solid rgba(236,231,221,0.2);
    animation: slide 0.35s ease;
  }
  @keyframes slide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .dim-body .q {
    font-size: 20px;
    line-height: 1.3;
    color: var(--paper);
    margin-bottom: 14px;
    letter-spacing: -0.01em;
    text-wrap: balance;
  }
  .dim-body .bar {
    height: 3px;
    background: rgba(236,231,221,0.15);
    margin: 4px 0 14px;
    position: relative;
    max-width: 400px;
  }
  .dim-body .bar .fill {
    height: 100%;
    background: var(--paper);
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }
  .dim-body .flags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .dim-body .flag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid rgba(236,231,221,0.4);
    padding: 3px 7px;
  }
  .dim-body .rx {
    display: flex; gap: 10px; align-items: flex-start;
    padding-top: 10px;
    border-top: 1px dashed rgba(236,231,221,0.25);
  }
  .dim-body .rx .arr {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
  }

  /* SCORE / VERDICT block */
  .verdict-block {
    background: var(--paper);
    padding: 40px 28px;
    border: 1px solid var(--ink);
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 40px;
    align-items: center;
  }
  @media (max-width: 820px) { .verdict-block { grid-template-columns: 1fr; gap: 20px; } }
  .verdict-block .big {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(140px, 22vw, 320px);
    line-height: 0.82;
    letter-spacing: -0.06em;
    display: flex;
    align-items: flex-end;
    gap: 0;
  }
  .verdict-block .big sup {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 0.12em;
    letter-spacing: 0;
    vertical-align: baseline;
    margin-left: 10px;
    margin-bottom: 0.9em;
    color: var(--muted);
    line-height: 1;
    text-transform: uppercase;
    white-space: nowrap;
    display: inline-block;
  }
  .verdict-block .diag {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 3.6vw, 42px);
    line-height: 1;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }
  .verdict-block .diag .u { text-decoration: underline; text-underline-offset: 6px; text-decoration-thickness: 2px; }
  .verdict-block .diag em { color: var(--red); font-style: normal; }
  .verdict-block .diag-meta {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-2);
    display: flex;
    gap: 8px 18px;
    flex-wrap: wrap;
  }
  .verdict-block .diag-meta b { color: var(--ink); font-weight: 700; }

  /* CTA black block */
  .cta {
    background: var(--ink);
    color: var(--paper);
    padding: 56px 28px;
    text-align: center;
    margin-bottom: 8px;
  }
  .cta h2 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 7vw, 84px);
    line-height: 1;
    letter-spacing: -0.03em;
    text-wrap: balance;
  }
  .cta h2 .u { text-decoration: underline; text-underline-offset: 8px; text-decoration-thickness: 3px; }
  .cta .sub {
    margin: 20px auto 30px;
    font-family: 'Archivo', sans-serif;
    font-size: 16px;
    line-height: 1.45;
    max-width: 440px;
    opacity: 0.8;
  }
  .cta .round-arrow {
    display: inline-flex;
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--paper);
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--paper);
    transition: background 0.15s, color 0.15s;
  }
  .cta .round-arrow:hover { background: var(--paper); color: var(--ink); }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-2);
    padding: 16px 4px 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* Scan strip */
  .status-strip {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 20px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .status-strip .pulse {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .status-strip .pulse span {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  .status-strip .progress {
    height: 2px;
    background: rgba(236,231,221,0.2);
    position: relative;
  }
  .status-strip .progress .fill {
    position: absolute; inset: 0;
    background: var(--red);
    transition: width 0.4s ease;
  }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useMemo } = React;

// ─── Firebase save ──────────────────────────────────────────────────────────
async function saveReport(data) {
  if (!window.__db) return false;
  try {
    await window.__db.collection("reports").add({
      ...data,
      createdAt: new Date().toISOString(),
    });
    return true;
  } catch (e) {
    console.warn("Firebase save failed:", e.message);
    return false;
  }
}

// ─── LocalStorage cache (24 h TTL) ─────────────────────────────────────────
const CACHE_TTL = 24 * 60 * 60 * 1000;

function getCacheKey(url, b64) {
  const u = url ? btoa(encodeURIComponent(url)).slice(0, 20) : "";
  const i = b64 ? b64.slice(0, 16) : "";
  return "bare_v1_" + u + "_" + i;
}

function loadFromCache(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { results, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(key); return null; }
    return results;
  } catch { return null; }
}

function saveToCache(key, results) {
  try { localStorage.setItem(key, JSON.stringify({ results, ts: Date.now() })); } catch {}
}

// ─── URL fetch via CORS proxy ───────────────────────────────────────────────
async function fetchUrlContent(rawUrl) {
  const url = /^https?:\/\//i.test(rawUrl) ? rawUrl : "https://" + rawUrl;
  try {
    const res = await fetch(
      "https://api.allorigins.win/get?url=" + encodeURIComponent(url),
      { signal: AbortSignal.timeout(10000) }
    );
    const json = await res.json();
    if (!json.contents) return null;
    return json.contents
      .replace(/<style[\s\S]*?<\/style>/gi, " ")
      .replace(/<script[\s\S]*?<\/script>/gi, " ")
      .replace(/<[^>]+>/g, " ")
      .replace(/&[a-z]+;/gi, " ")
      .replace(/\s+/g, " ")
      .trim()
      .slice(0, 7000);
  } catch { return null; }
}

// ─── Gemini API call ────────────────────────────────────────────────────────
async function runDim(key, url, imageBase64, imageMime, apiKey) {
  const parts = [];

  if (url) {
    const content = await fetchUrlContent(url);
    parts.push({
      text: content
        ? "Brand website content from " + url + ":\n\n" + content
        : "Brand URL: " + url + " — could not fetch page. Analyze from domain name and context only.",
    });
  }

  if (imageBase64) {
    parts.push({ inlineData: { mimeType: imageMime || "image/jpeg", data: imageBase64 } });
    parts.push({ text: url ? "Also analyze this brand screenshot for visual cues." : "Analyze this brand visual in full." });
  }

  if (!url && !imageBase64) {
    parts.push({ text: "No brand data provided. Return score 0 with relevant flags." });
  }

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: PROMPTS[key] }] },
          contents: [{ role: "user", parts }],
          generationConfig: { temperature: 0.3, maxOutputTokens: 400 },
        }),
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.candidates?.[0]?.content?.parts?.[0]?.text || "")
      .replace(/```json|```/g, "").trim();
    const m = text.match(/\{[\s\S]*\}/);
    return JSON.parse(m ? m[0] : text);
  } catch (e) {
    console.error("Gemini error [" + key + "]:", e.message);
    return {
      score: 0,
      flags: ["GEMINI ERROR", (e.message || "API FAILED").slice(0, 38).toUpperCase()],
      verdict: "API call failed. Verify your Gemini key.",
      improvement: "Check key at ai.google.dev and retry.",
    };
  }
}

// ─── Constants ──────────────────────────────────────────────────────────────
const DIMENSIONS = [
  { key: "typography",      label: "TYPOGRAPHY",      sub: "GENERIC VS. CUSTOM" },
  { key: "color",           label: "COLOR SYSTEM",    sub: "DEFAULT VS. INTENTIONAL" },
  { key: "consistency",     label: "VISUAL SYSTEM",   sub: "CHAOS VS. COHESION" },
  { key: "aiDetection",     label: "AI DETECTION",    sub: "MACHINE VS. HUMAN" },
  { key: "differentiation", label: "DIFFERENTIATION", sub: "INVISIBLE VS. MEMORABLE" },
  { key: "assets",          label: "ASSET QUALITY",   sub: "STOCK VS. ORIGINAL" },
];

const PROMPTS = {
  typography: `You are a brutal typography forensics expert. Evaluate generic vs. custom fonts, type scale, pairing. Return ONLY valid JSON: {"score":0-100,"flags":["..","..",],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=generic defaults, 100=distinctive system.`,
  color: `Color system auditor. Default palette vs. intentional brand color. Return ONLY valid JSON: {"score":0-100,"flags":["..",".."],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=default, 100=intentional.`,
  consistency: `Visual system auditor. System or chaos? Return ONLY valid JSON: {"score":0-100,"flags":["..",".."],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=chaos, 100=cohesion.`,
  aiDetection: `AI-generated design detector. Look for mesh gradients, glassmorphism, shadcn defaults, Lucide icons, purple gradients, Inter everywhere. Return ONLY valid JSON: {"score":0-100,"flags":["..",".."],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=AI-generated, 100=human.`,
  differentiation: `Brand differentiation analyst. Memorable or interchangeable? Return ONLY valid JSON: {"score":0-100,"flags":["..",".."],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=invisible, 100=unmistakable.`,
  assets: `Asset quality auditor. Stock vs. original. Return ONLY valid JSON: {"score":0-100,"flags":["..",".."],"verdict":"1 brutal sentence max 12 words","improvement":"1 concrete action max 12 words"}. 0=stock, 100=original.`,
};

// ─── Score helpers ──────────────────────────────────────────────────────────
function scoreKind(s) {
  if (s == null) return "pending";
  if (s >= 70) return "green";
  if (s >= 45) return "amber";
  return "red";
}
function scoreColor(s) {
  const k = scoreKind(s);
  if (k === "green") return "var(--green)";
  if (k === "amber") return "var(--amber)";
  if (k === "red") return "var(--red)";
  return "currentColor";
}
function diagText(s) {
  if (s >= 80) return ["Genuine", "design", "intent."];
  if (s >= 65) return ["Considered.", "Inconsistently", "executed."];
  if (s >= 45) return ["A few", "real", "decisions."];
  if (s >= 25) return ["Running on", "factory", "settings."];
  return ["Critically", "undesigned.", "Start over."];
}

// ─── CountUp ────────────────────────────────────────────────────────────────
function CountUp({ target, duration = 1400 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (target == null) return;
    let raf, start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      setVal(Math.floor(p * target));
      if (p < 1) raf = requestAnimationFrame(step);
      else setVal(target);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return <>{val}</>;
}

// ─── DimRow ─────────────────────────────────────────────────────────────────
function DimRow({ idx, dim, result, active, isOpen, onToggle }) {
  const done = result && typeof result.score === "number";
  return (
    <>
      <div
        className={"dim-row" + (isOpen ? " open" : "") + (active ? " scanning" : "")}
        onClick={onToggle}
      >
        <div className="num">{String(idx + 1).padStart(2, "0")}.</div>
        <div className="t">
          {dim.label}
          <span className="sub">{dim.sub}</span>
        </div>
        {done ? (
          <div className="score-inline" style={{ color: "var(--accent)" }}>
            {result.score}
          </div>
        ) : (
          <div className="ic">{active ? "◐" : "+"}</div>
        )}
      </div>
      {isOpen && done && (
        <div className="dim-body">
          <div className="q">"{result.verdict.replace(/^["']|["']$/g,"")}"</div>
          <div className="bar"><div className="fill" style={{ width: result.score + "%" }} /></div>
          {result.flags && result.flags.length > 0 && (
            <div className="flags">
              {result.flags.map((f, i) => <span className="flag" key={i}>{f}</span>)}
            </div>
          )}
          {result.improvement && (
            <div className="rx">
              <span className="arr">RX →</span>
              <span>{result.improvement}</span>
            </div>
          )}
        </div>
      )}
    </>
  );
}

// ─── ApiKeyModal ─────────────────────────────────────────────────────────────
function ApiKeyModal({ onSave }) {
  const [key, setKey] = useState("");
  const valid = key.length > 10;
  return (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="eyebrow">/ GEMINI API KEY</div>
        <div className="modal-title">
          Power the engine.<br/>
          <span style={{ opacity: 0.45, fontSize: "0.55em", letterSpacing: 0, fontWeight: 500 }}>
            Free key → ai.google.dev
          </span>
        </div>
        <div className="field" style={{ marginBottom: 20 }}>
          <div className="field-label">/ Gemini API Key</div>
          <input
            className="bare-input"
            type="password"
            placeholder="AIza..."
            value={key}
            onChange={e => setKey(e.target.value)}
            onKeyDown={e => e.key === "Enter" && valid && onSave(key)}
            autoFocus
          />
        </div>
        <button className="run-btn" style={{ marginTop: 0 }} disabled={!valid} onClick={() => onSave(key)}>
          Save &amp; Run Diagnosis
          <span className="arrow">→</span>
        </button>
        <div className="modal-note">
          Stored in your browser only. Never sent to our servers.
        </div>
      </div>
    </div>
  );
}

// ─── EmailModal ──────────────────────────────────────────────────────────────
function EmailModal({ score, url, results, specimenId, dateStr, onClose }) {
  const [email, setEmail] = useState(() => localStorage.getItem("bare_email") || "");
  const [status, setStatus] = useState("idle");

  const generateReportText = () => {
    const diag = diagText(score).join(" ");
    const divider = "\u2500".repeat(38);
    const assays = DIMENSIONS.map((d, i) => {
      const r = results[d.key];
      if (!r) return "";
      return [
        String(i + 1).padStart(2, "0") + ". " + d.label + " \u2014 " + r.score + "/100",
        '   "' + r.verdict + '"',
        "   RX \u2192 " + r.improvement,
        r.flags && r.flags.length ? "   FLAGS: " + r.flags.join(", ") : "",
      ].filter(Boolean).join("\n");
    }).join("\n\n");

    return [
      "BARE BRAND AUDIT REPORT",
      divider,
      "",
      "File:    #" + specimenId,
      "Date:    " + dateStr,
      "Subject: " + (url || "Image specimen"),
      "",
      "BARE SCORE: " + score + "/100",
      diag,
      "",
      "ASSAY BREAKDOWN",
      divider,
      "",
      assays,
      "",
      divider,
      "Generated by BARE \u00b7 Brand Aesthetic Reality Engine",
    ].join("\n");
  };

  const handleSend = async () => {
    if (!email.includes("@")) return;
    localStorage.setItem("bare_email", email);
    setStatus("sending");

    const reportText = generateReportText();
    const subject = encodeURIComponent("BARE Report #" + specimenId + " \u2014 Score " + score + "/100");
    const body = encodeURIComponent(reportText);
    window.open("mailto:" + encodeURIComponent(email) + "?subject=" + subject + "&body=" + body, "_blank");

    await saveReport({ email, score, url: url || "image", results, specimenId, dateStr });
    setStatus("done");
  };

  return (
    <div className="modal-overlay">
      <div className="modal-box">
        {status === "done" ? (
          <>
            <div className="eyebrow">/ REPORT SENT</div>
            <div className="modal-title">
              Check your inbox.<br/>
              <em style={{ color: "var(--accent)", fontStyle: "normal" }}>No flattery included.</em>
            </div>
            <button className="run-btn" onClick={onClose} style={{ marginTop: 0 }}>
              Done <span className="arrow">✓</span>
            </button>
          </>
        ) : (
          <>
            <div className="eyebrow">/ REPORT DELIVERY</div>
            <div className="modal-title">
              Score: <em style={{ color: "var(--accent)", fontStyle: "normal" }}>{score}</em>/100.<br/>
              Get the full receipts.
            </div>
            <div className="field" style={{ marginBottom: 20 }}>
              <div className="field-label">/ Your Email</div>
              <input
                className="bare-input"
                type="email"
                placeholder="your@email.com"
                value={email}
                onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleSend()}
                autoFocus
              />
            </div>
            <button
              className="run-btn"
              style={{ marginTop: 0 }}
              disabled={status === "sending" || !email.includes("@")}
              onClick={handleSend}
            >
              {status === "sending" ? "Opening email…" : "Send Report"}
              <span className="arrow">→</span>
            </button>
            <button className="modal-skip" onClick={onClose}>SKIP →</button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [url, setUrl] = useState("");
  const [image, setImage] = useState(null);
  const [imageBase64, setImageBase64] = useState(null);
  const [imageMime, setImageMime] = useState("image/jpeg");
  const [phase, setPhase] = useState("idle");
  const [results, setResults] = useState({});
  const [currentDim, setCurrentDim] = useState("");
  const [openDim, setOpenDim] = useState("typography");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("bare_gemini_key") || "");
  const [showKeyModal, setShowKeyModal] = useState(false);
  const [showEmailModal, setShowEmailModal] = useState(false);
  const fileRef = useRef();

  // TWEAKS
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#ff8c42",
    "inverted": false,
    "fontScale": 1.01
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", tweaks.accent);
    root.style.setProperty("--red", tweaks.accent);
    root.style.setProperty("--green", tweaks.accent);
    root.style.setProperty("--amber", tweaks.accent);
    if (tweaks.inverted) {
      root.style.setProperty("--paper", "#000000");
      root.style.setProperty("--paper-2", "#0a0a0a");
      root.style.setProperty("--ink", "#ffffff");
      root.style.setProperty("--ink-2", "#e5e5e5");
      root.style.setProperty("--muted", "#888");
      root.style.setProperty("--rule", "#ffffff");
    } else {
      root.style.setProperty("--paper", "#ffffff");
      root.style.setProperty("--paper-2", "#f4f4f4");
      root.style.setProperty("--ink", "#000000");
      root.style.setProperty("--ink-2", "#1a1a1a");
      root.style.setProperty("--muted", "#6b6b6b");
      root.style.setProperty("--rule", "#000000");
    }
    document.body.style.fontSize = (16 * tweaks.fontScale) + "px";
  }, [tweaks]);

  const updateTweak = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  const handleImage = (file) => {
    if (!file) return;
    setImage(URL.createObjectURL(file));
    setImageMime(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onload = (e) => setImageBase64(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  };

  const canRun = (url.trim().length > 3 || !!imageBase64) && phase === "idle";

  const bareScore = useMemo(() => {
    const vals = Object.values(results).map(r => r?.score).filter(v => typeof v === "number");
    if (vals.length !== DIMENSIONS.length) return null;
    return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  }, [results]);

  const runAnalysis = async (keyOverride) => {
    const activeKey = keyOverride || apiKey;
    if (!activeKey) { setShowKeyModal(true); return; }
    if (!url.trim() && !imageBase64) return;

    const cacheKey = getCacheKey(url, imageBase64);
    const cached = loadFromCache(cacheKey);
    if (cached) {
      setResults(cached);
      setPhase("done");
      setTimeout(() => setShowEmailModal(true), 600);
      return;
    }

    setPhase("scanning");
    setResults({});
    setCurrentDim(DIMENSIONS[0].label);
    setOpenDim(DIMENSIONS[0].key);

    const next = {};
    for (const dim of DIMENSIONS) {
      setCurrentDim(dim.label);
      setOpenDim(dim.key);
      const r = await runDim(dim.key, url, imageBase64, imageMime, activeKey);
      next[dim.key] = r;
      setResults({ ...next });
      await new Promise(resolve => setTimeout(resolve, 180));
    }
    setCurrentDim("");
    setPhase("done");
    saveToCache(cacheKey, next);
    setTimeout(() => setShowEmailModal(true), 800);
  };

  const handleSaveKey = (k) => {
    localStorage.setItem("bare_gemini_key", k);
    setApiKey(k);
    setShowKeyModal(false);
    runAnalysis(k);
  };

  const reset = () => {
    setPhase("idle");
    setUrl("");
    setImage(null);
    setImageBase64(null);
    setImageMime("image/jpeg");
    setResults({});
    setCurrentDim("");
    setOpenDim("typography");
    setShowEmailModal(false);
    window.scrollTo({ top: 0 });
  };

  const completedCount = Object.keys(results).length;
  const progressPct = Math.round((completedCount / DIMENSIONS.length) * 100);
  const specimenId = useMemo(() => "SPC-" + Math.floor(Math.random() * 90000 + 10000), []);
  const dateStr = useMemo(() => {
    const d = new Date();
    const pad = n => String(n).padStart(2, "0");
    return d.getFullYear() + "." + pad(d.getMonth() + 1) + "." + pad(d.getDate());
  }, []);

  const diag = bareScore != null ? diagText(bareScore) : null;
  const bigColor = bareScore == null ? "var(--ink)" :
    bareScore >= 70 ? "var(--green)" :
    bareScore >= 45 ? "var(--amber)" : "var(--red)";

  return (
    <div className="app">
      {/* Modals */}
      {showKeyModal && <ApiKeyModal onSave={handleSaveKey} />}
      {showEmailModal && bareScore != null && (
        <EmailModal
          score={bareScore}
          url={url}
          results={results}
          specimenId={specimenId}
          dateStr={dateStr}
          onClose={() => setShowEmailModal(false)}
        />
      )}

      {/* TOP RAIL */}
      <div className="rail">
        <div>/ BARE</div>
        <div className="pill"><span className="dot"/>DIAGNOSTIC · LIVE</div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <span>{dateStr}</span>
          <button
            onClick={() => setShowKeyModal(true)}
            style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "JetBrains Mono, monospace", fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: apiKey ? "var(--ink)" : "var(--accent)", opacity: apiKey ? 0.5 : 1, textDecoration: "underline" }}
          >
            {apiKey ? "GEMINI ●" : "+ SET KEY"}
          </button>
        </div>
      </div>

      {/* HERO (idle + scanning) */}
      {phase !== "done" && (
        <div className="hero">
          {/* LEFT: brand plate */}
          <div className="hero-left">
            <div className="hero-nav">
              <div>
                <a href="#">HOME</a>
                <a href="#">METHOD</a>
                <a href="#">CASES</a>
              </div>
              <div className="right">
                <a href="#">PRICING</a>
                <a href="#">ABOUT</a>
                <a href="#">CONTACT</a>
              </div>
            </div>

            <div>
              <div className="hero-wordmark">
                BARE<sup>©</sup>
              </div>
              <div className="hero-tagline">
                <span className="tag-eyebrow">/ DISCLAIMER</span>
                <p>
                  An <span className="u">AI tool</span> built to catch brands that look <span className="u">AI-made</span>.
                </p>
                <p className="small">
                  Yes, we see the irony. That's the point, the thing best at sniffing out default gradients, unmodified Lucide icons and Inter-everything is the same thing that made them. Fight fire with fire.
                </p>
              </div>
            </div>

            <div className="hero-footnote">
              <div>AUDIT YOUR BRAND</div>
              <div>WITHOUT THE FLATTERY</div>
            </div>
          </div>

          {/* RIGHT: intake */}
          <div className="hero-right">
            <div className="eyebrow">/ INTAKE</div>
            <h2>
              Show us<br/>
              your <span className="u">brand</span>.<br/>
              We'll show<br/>
              you the <span className="dot">truth</span>.
            </h2>

            <div className="consent">
              The <span className="u">Brand Aesthetic Reality Engine</span> runs six independent assays on your site or screenshot (<em style={{ color: "var(--red)" }}>typography, color, system, AI-detection, differentiation, and assets</em>), returning a single blunt score out of 100.
            </div>

            <div className="intake-subgrid">
              <div className="field">
                <div className="field-label">/ Brand URL</div>
                <input
                  className="bare-input"
                  placeholder="yourbrand.com"
                  value={url}
                  disabled={phase !== "idle"}
                  onChange={e => setUrl(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && canRun && runAnalysis()}
                />
              </div>
              <div className="field">
                <div className="field-label">/ Screenshot (Optional)</div>
                <div
                  className="upload"
                  onClick={() => phase === "idle" && fileRef.current?.click()}
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => { e.preventDefault(); if (phase === "idle") handleImage(e.dataTransfer.files[0]); }}
                >
                  {image ? (
                    <>
                      <img src={image} alt="specimen" />
                      <div className="chip">RECEIVED</div>
                    </>
                  ) : (
                    <div className="hint">
                      <span className="plus">+</span>
                      Drop or click
                    </div>
                  )}
                  <input
                    ref={fileRef}
                    type="file"
                    accept="image/*"
                    style={{ display: "none" }}
                    onChange={(e) => handleImage(e.target.files[0])}
                  />
                </div>
              </div>
            </div>

            <button className="run-btn" disabled={!canRun} onClick={() => runAnalysis()} style={{ marginTop: 32 }}>
              {phase === "scanning" ? "Analyzing…" : "Begin Diagnosis"}
              <span className="arrow">→</span>
            </button>
          </div>
        </div>
      )}

      {/* STATUS STRIP during scan */}
      {phase === "scanning" && (
        <div className="status-strip">
          <div className="pulse"><span/>ANALYZING, {currentDim || "BOOTING"}</div>
          <div className="progress"><div className="fill" style={{ width: progressPct + "%" }} /></div>
          <div>{completedCount}/{DIMENSIONS.length} ASSAYS</div>
        </div>
      )}

      {/* VERDICT, when done */}
      {phase === "done" && bareScore != null && (
        <div className="verdict-block">
          <div className="big" style={{ color: bigColor }}>
            <CountUp target={bareScore} duration={1600} /><sup>/100</sup>
          </div>
          <div>
            <div className="eyebrow">/ DIAGNOSIS</div>
            <div className="diag">
              {diag[0]} <span className="u">{diag[1]}</span> <em>{diag[2]}</em>
            </div>
            <div className="diag-meta">
              <span>File <b>#{specimenId}</b></span>
              <span>{dateStr}</span>
              <span>Subject <b>{url ? url.replace(/^https?:\/\//, "").slice(0, 28) : "image specimen"}</b></span>
              <span>Assays <b>{DIMENSIONS.length}/{DIMENSIONS.length}</b></span>
            </div>
          </div>
        </div>
      )}

      {/* MANIFESTO, shown in idle */}
      {phase === "idle" && (
        <div className="manifesto">
          <div className="eyebrow">/ MANIFESTO</div>
          <div className="body">
            The internet is saturated with <span className="u">brands that feel like templates</span>. BARE is the antithesis, a <em>forensic audit</em> for founders and designers who want to know exactly where their identity is <span className="u">borrowed, generic, or dead</span>. No flattery. No algorithms. <em>Just intent.</em>
          </div>
          <div className="stat-row">
            <div className="stat"><div className="n">6</div><div className="l">/ ASSAYS</div></div>
            <div className="stat"><div className="n">100</div><div className="l">/ MAX SCORE</div></div>
            <div className="stat"><div className="n">12s</div><div className="l">/ AVG RUNTIME</div></div>
          </div>
        </div>
      )}

      {/* HOW IT WORKS / ASSAY LIST, always visible once scanning or done */}
      {phase !== "idle" && (
        <div className="works">
          <div className="works-head">
            <div>
              <div className="eyebrow">/ ASSAYS</div>
              <h2 className="h2" style={{ color: "var(--paper)" }}>How It Works.</h2>
            </div>
            <div className="tags">
              <a href="#" className="active">→ All</a>
              <a href="#">Type</a>
              <a href="#">Color</a>
              <a href="#">System</a>
              <a href="#">Signal</a>
              <a href="#">Assets</a>
            </div>
          </div>

          {DIMENSIONS.map((d, i) => (
            <DimRow
              key={d.key}
              idx={i}
              dim={d}
              result={results[d.key]}
              active={phase === "scanning" && currentDim === d.label}
              isOpen={openDim === d.key}
              onToggle={() => setOpenDim(openDim === d.key ? null : d.key)}
            />
          ))}
        </div>
      )}

      {/* CHECKLIST, static in idle */}
      {phase === "idle" && (
        <div className="checklist-sec">
          <div>
            <div className="eyebrow">/ WHAT WE FLAG</div>
            <h2 className="h2">Red flags<br/>we <span style={{ textDecoration: "underline", textUnderlineOffset: "6px", textDecorationThickness: "2px" }}>won't</span> miss.</h2>
          </div>
          <ul className="check-list">
            <li><span className="x">×</span>Inter everywhere.</li>
            <li><span className="x">×</span>Unmodified Lucide icons.</li>
            <li><span className="x">×</span>Shadcn card farms.</li>
            <li><span className="x">×</span>Purple mesh gradient heroes.</li>
            <li><span className="x">×</span>Beige "premium" defaults.</li>
            <li><span className="x">×</span>Generic stock photography.</li>
            <li><span className="x">×</span>Glassmorphism without reason.</li>
            <li><span className="x">×</span>Tailwind gray scale as palette.</li>
          </ul>
        </div>
      )}

      {/* CTA block */}
      <div className="cta">
        {phase === "done" ? (
          <>
            <h2>
              Now <span className="u">fix it</span>.<br/>
              Or <span className="u">ship it</span>.<br/>
              <em style={{ color: "var(--red)", fontStyle: "normal" }}>Your call.</em>
            </h2>
            <div className="sub">You've got the receipts. Take one item from the ledger above and ship a change this week.</div>
            <button className="round-arrow" onClick={reset}>↺</button>
          </>
        ) : (
          <>
            <h2>
              Cut Through<br/>
              <span className="u">The Noise</span>.<br/>
              See Your Brand <em style={{ color: "var(--red)", fontStyle: "normal" }}>Clearly</em>.
            </h2>
            <div className="sub">Six assays. One blunt score. No flattery. Designed for founders and designers who can handle the truth.</div>
            <button className="round-arrow" onClick={() => document.querySelector(".bare-input")?.focus()}>↗</button>
          </>
        )}
      </div>

      <div className="footer">
        <div>BARE · BRAND AESTHETIC REALITY ENGINE</div>
        <div>(BY BANANALAB, WITH LOVE &amp; CONTEMPT)</div>
        <div>V3.0 · {dateStr}</div>
      </div>

      {editMode && (
        <div className="tweaks-panel">
          <div className="tw-head">
            <span><span className="dot"/>TWEAKS</span>
            <span>3-COLOR</span>
          </div>
          <div className="tw-body">
            <div className="tw-group">
              <div className="tw-label">/ Accent</div>
              <div className="tw-swatches">
                {[
                  { v: "#ff6a1a", name: "Orange" },
                  { v: "#ff4800", name: "Red-Orange" },
                  { v: "#ffa500", name: "Amber" },
                  { v: "#ff8c42", name: "Soft" },
                ].map(s => (
                  <div
                    key={s.v}
                    className={"tw-sw" + (tweaks.accent === s.v ? " active" : "")}
                    style={{ background: s.v }}
                    title={s.name}
                    onClick={() => updateTweak({ accent: s.v })}
                  />
                ))}
              </div>
            </div>
            <div className="tw-group">
              <div className="tw-label">/ Mode</div>
              <button
                className={"tw-invert-btn" + (tweaks.inverted ? " on" : "")}
                onClick={() => updateTweak({ inverted: !tweaks.inverted })}
              >
                {tweaks.inverted ? "Inverted (black bg)" : "Standard (white bg)"}
              </button>
            </div>
            <div className="tw-group">
              <div className="tw-row">
                <div className="tw-label">/ Type Scale</div>
                <div className="tw-val">{tweaks.fontScale.toFixed(2)}×</div>
              </div>
              <input
                type="range"
                className="tw-slider"
                min="0.85"
                max="1.2"
                step="0.01"
                value={tweaks.fontScale}
                onChange={e => updateTweak({ fontScale: parseFloat(e.target.value) })}
              />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
